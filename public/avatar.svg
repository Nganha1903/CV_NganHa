<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22A2E8" />
      <stop offset="100%" stop-color="#1295DE" />
    </linearGradient>

    <!-- Jacket Royal Blue Gradient -->
    <linearGradient id="jacketBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C62EC" />
      <stop offset="50%" stop-color="#1555D8" />
      <stop offset="100%" stop-color="#0E42B1" />
    </linearGradient>

    <!-- Skin Tone Gradient -->
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8D7C0" />
      <stop offset="100%" stop-color="#EBBFA1" />
    </linearGradient>

    <!-- Hair Color -->
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2B2F38" />
      <stop offset="100%" stop-color="#15181E" />
    </linearGradient>
  </defs>

  <!-- Sky Blue Background -->
  <rect width="400" height="400" fill="url(#bgGradient)" />

  <!-- Shoulders & Body / Royal Blue Tracksuit Jacket -->
  <path d="M 20 400 L 50 260 Q 120 210 200 210 Q 280 210 350 260 L 380 400 Z" fill="url(#jacketBlue)" />

  <!-- White Shoulder Stripes (Left) -->
  <path d="M 55 265 L 25 400" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.9" />
  <path d="M 70 258 L 45 400" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.9" />

  <!-- White Shoulder Stripes (Right) -->
  <path d="M 345 265 L 375 400" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.9" />
  <path d="M 330 258 L 355 400" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.9" />

  <!-- Zipped Collar -->
  <path d="M 150 210 L 165 160 Q 200 168 235 160 L 250 210 Q 200 230 150 210 Z" fill="#0C348A" />
  <path d="M 160 160 Q 200 172 240 160 Q 220 200 200 202 Q 180 200 160 160 Z" fill="#F8D7C0" />

  <!-- Central Zipper -->
  <line x1="200" y1="202" x2="200" y2="400" stroke="#1041AE" stroke-width="3" />
  <line x1="200" y1="202" x2="200" y2="400" stroke="#A5B4FC" stroke-width="1.5" stroke-dasharray="4,2" />
  <!-- Zipper Pull -->
  <rect x="196" y="198" width="8" height="12" rx="2" fill="#E2E8F0" />

  <!-- Neck -->
  <rect x="165" y="125" width="70" height="50" rx="8" fill="url(#skinGrad)" />
  <path d="M 165 150 Q 200 165 235 150 L 235 170 Q 200 175 165 170 Z" fill="#DFA888" opacity="0.4" />

  <!-- Ears -->
  <ellipse cx="128" cy="105" rx="11" ry="16" fill="#EBBFA1" />
  <ellipse cx="128" cy="105" rx="6" ry="10" fill="#DFAD8E" />
  <ellipse cx="272" cy="105" rx="11" ry="16" fill="#EBBFA1" />
  <ellipse cx="272" cy="105" rx="6" ry="10" fill="#DFAD8E" />

  <!-- Head / Face -->
  <path d="M 130 85 C 130 20 270 20 270 85 C 270 140 245 165 200 165 C 155 165 130 140 130 85 Z" fill="url(#skinGrad)" />

  <!-- Eyebrows (Neat, dark) -->
  <path d="M 148 78 Q 168 70 185 76" stroke="#1A1D24" stroke-width="4.5" stroke-linecap="round" fill="none" />
  <path d="M 215 76 Q 232 70 252 78" stroke="#1A1D24" stroke-width="4.5" stroke-linecap="round" fill="none" />

  <!-- Eyes -->
  <ellipse cx="167" cy="88" rx="10" ry="7" fill="#FFFFFF" />
  <ellipse cx="233" cy="88" rx="10" ry="7" fill="#FFFFFF" />
  <circle cx="167" cy="88" r="5" fill="#181B20" />
  <circle cx="233" cy="88" r="5" fill="#181B20" />
  <circle cx="165" cy="86" r="1.5" fill="#FFFFFF" />
  <circle cx="231" cy="86" r="1.5" fill="#FFFFFF" />

  <!-- Nose -->
  <path d="M 196 86 L 200 112 Q 205 114 208 111" stroke="#D19875" stroke-width="2.5" stroke-linecap="round" fill="none" />

  <!-- Lips -->
  <path d="M 178 132 Q 200 138 222 132" stroke="#C87063" stroke-width="3.5" stroke-linecap="round" fill="none" />
  <path d="M 184 132 Q 200 126 216 132" stroke="#D98174" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6" fill="none" />

  <!-- Hair (Short dark fringe style cut) -->
  <!-- Back / Top hair volume -->
  <path d="M 124 85 C 120 25 160 5 200 5 C 240 5 280 25 276 85 C 276 60 260 15 200 13 C 140 15 124 60 124 85 Z" fill="url(#hairGrad)" />
  <!-- Fringe & Front bangs -->
  <path d="M 124 80 C 124 45 150 15 200 13 C 250 15 276 45 276 80 Q 260 50 240 55 Q 220 45 200 62 Q 180 48 160 60 Q 140 50 124 80 Z" fill="url(#hairGrad)" />
  <!-- Hair Texture Highlights -->
  <path d="M 150 28 Q 180 18 210 24" stroke="#4B5363" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5" />
  <path d="M 165 40 Q 195 28 230 35" stroke="#4B5363" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.4" />
</svg>
